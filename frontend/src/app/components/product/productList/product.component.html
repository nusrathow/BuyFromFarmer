<div style="margin-left:10px;margin-top:40px">
  <h4>{{categoryName.name}}</h4>
</div>

<div class="row mt20">
  <div class="col-sm-3 mt20" *ngFor="let s of productList" (click)="goToProductDetails(s.id)">
    <div class="card" style="width: 17rem;">
      <img class="card-img-top" src="assets/Pictures/farmer1.jpg" alt="Card image cap">
      <div class="card-body">
        <h5 class="card-title">{{s.name}}</h5>
      </div>
    </div>
  </div>
</div>
